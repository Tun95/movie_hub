<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/movie-icon.svg" />

    <!-- Google Fonts - Lexend Deca (Primary), Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph tags for social sharing -->
    <meta
      property="og:title"
      content="MovieHub | Discover Your Next Favorite Movie"
    />
    <meta
      property="og:description"
      content="Discover popular, top rated, and upcoming movies. Find your next favorite movie with MovieHub."
    />
    <meta
      property="og:image"
      content="https://moviehub.vercel.app/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://moviehub.vercel.app" />
    <meta property="og:site_name" content="MovieHub" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="MovieHub | Discover Your Next Favorite Movie"
    />
    <meta
      name="twitter:description"
      content="Discover popular, top rated, and upcoming movies. Find your next favorite movie with MovieHub."
    />
    <meta
      name="twitter:image"
      content="https://moviehub.vercel.app/og-image.png"
    />

    <!-- SEO meta tags -->
    <meta
      name="description"
      content="Discover popular, top rated, and upcoming movies. Find your next favorite movie with MovieHub. Browse thousands of movies, view details, and find your next cinematic experience."
    />
    <meta
      name="keywords"
      content="movies, film, cinema, movie database, popular movies, top rated movies, upcoming movies, movie search, movie reviews, ratings, TMDB"
    />
    <meta name="author" content="MovieHub" />
    <meta name="robots" content="index, follow" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#02250a" />

    <!-- Apple Touch Icon for iOS -->
    <link rel="apple-touch-icon" href="/movie-icon-192.png" />

    <!-- Manifest for PWA -->
    <link rel="manifest" href="/manifest.json" />

    <title>MovieHub | Discover Your Next Favorite Movie</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
